<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

  <style>
    body{
background-image:url("https://66.media.tumblr.com/65cff898fadc321a12d3038fddfc5546/tumblr_o2l7zsaLo91v7k1kfo1_500.gif") ;
background-size: cover;

  #movi1-pic {
    border: 2px rgb(156, 50, 255);
    width: 200px;

    color:rgb(212, 165, 255)
    }

  <body>
    
  

   

    <h1>Quiz About [Kai]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite Ghibli movie?
        <select id="movie-answer">
          <option value="movie1">KiKi's delivery service</option>
          <option value="movie2">Howl's Moving Castle</option>
          <option value="movie3">Princess Mononoke</option>
          <option value="movie4">Spirited away</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      
       
       <img id="movi1-pic" src="https://s3.amazonaws.com/nightjarprod/content/uploads/sites/344/2024/06/23065214/kikis-delivery-service.png"
       width="250"
       height="250"
       >

      <img id="movi2-pic" src="https://mediaproxy.tvtropes.org/width/1200/https://static.tvtropes.org/pmwiki/pub/images/howlsmovingcastle_1.png"
      width="250"
      height="250"
      >

      <img id="movi3-pic" src="https://static.wikia.nocookie.net/studio-ghibli/images/c/c6/Princess_Mononoke.jpg/revision/latest/scale-to-width/360?cb=20220409212252"
      width="290"
      height="290"
      > 

      <img id="movi4-pic" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlHZe1ihDN31TSFeWiGKVOE8uI5KT6oxt11CbZ41xCfDSd9aGUh8AcDbY8ptGXk3pwJCyE&s=10"
      width="290"
      
      >

    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        ✈ Where did i travel during the summer with my choir?
        <select id="book-answer">
          <option value="book1">California</option>
          <option value="book2">Japan</option>
          <option value="book3">Italy</option>
          <option value="book4">Nowhere</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
   
    
    
    
    
      </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      $("#movi3-pic").hide();
      $("#movi1-pic").hide();
      $("#movi2-pic").hide();
      $("#movi4-pic").hide();
      $("#movi4-pic").hide();
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();
      
        $("#movi1-pic").hide();
      $("#movi2-pic").hide();
      $("#movi3-pic").hide();
      $("movi4-pic").hide();
        var $answer = $("#movie-answer");
        var answer = $answer.val();
        //  $("#movi1-pic").hide().fadeIn(2000);


        if (answer === "movie1") {
          $("#movie-text").hide().fadeIn(2000).text("Its cute but not my fav! close!");
           $("#movi1-pic").fadeIn(2000).show();
         

            // $("#movi2-pic").hide().fadeIn(2000);
        } 
          
          else if (answer=== "movie4") {
          $("#movi4-pic").hide();
            $("#movie-text").hide().fadeIn(2000).text("This movie is so creative and adorable but not my fav keep trying!")
            $("#movi4-pic").fadeIn(2000).show();
          }

        
         else if (answer === "movie3")  {
          $("#movi3-pic").hide();
          $("#movie-text").hide().fadeIn(2000).text("UNDERRATED MOVIE i love it so much i can talk about it for 45 minutes but lets move on. You are correct btw")
          $("#movi3-pic").fadeIn(2000).show();

          // $("#")
        }


        


         else  {
          
          $("#movie-text").hide().fadeIn(2000).text("I really love this movie it was my fav for a while but its not my number one fav anymore :3 try again!");
          $("#movi2-pic").fadeIn(2000).show();

        }
        
         
        

      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("Nope I WANT TO THO. NEXT VACAY!");
        } 
        else if (answer === "book2") {
          $("#book-text").text("DING DING DING. I reccomend its such a good vacay place");
        }

         else if (answer === "book3") {
            $("#book-text").hide().fadeIn(2000).text("Not quite try again")
          }




      });
      
    </script>
  </body>
